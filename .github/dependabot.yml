version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      symfony:
        patterns:
          - "symfony/*"
      production:
        dependency-type: production
      dev:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
